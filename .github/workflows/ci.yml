name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # glassloop is on PyPI and declared in pyproject dependencies, so it
      # resolves automatically from the editable install below.
      - name: Install proofloop (+ glassloop from PyPI)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test (knowlytix absent — GMS-gated tests skip)
        run: pytest -q
