# Application layer: Banking Complaint Agent (Beyond Prompt and Pray, Ch15-16)
# =============================================================================
# This is the APPLICATION config, deliberately separate from the domain-neutral
# catalogs/. It does two things the general catalog must not:
#
#   1. Selects the orthogonal catalog factors this app exercises.
#   2. Supplies this app's level VOCABULARY (level_overrides) on top of those
#      catalog factors.
#
# Ch16's ad hoc harness fused several catalog factors into 3 ("entity_aliasing"
# carried a typo level that is really `noise`; "reasoning_cue" carried an
# injection nudge that is really `instruction_conflict`). We keep them
# normalized: 5 orthogonal factors give finer failure attribution than the
# fused 3, and supersede the ad hoc design rather than copy it.
# =============================================================================

app: complaint_agent
description: "Governed banking complaint agent — test + SFT data generation."

# Data the app binds to (paths relative to the agent-tutorial-private repo root).
data:
  cases: data/eval_cases/cases.json          # 20 labeled seed cases (SeedCaseSource)
  policy_store: data/gms_policy_store         # Policy GMS (source of truth / oracle)
  goldens: data/training/bank_policy/draft_response_goldens.json

# Base selection. For trajectory/component testing the base is the labeled seed
# cases; the behavioral/governance categories are what they exercise.
bases:
  source: seed_cases                          # seed_cases | catalog | user
  families: [behavioral_operational]          # governance_policy, recovery
  categories: [conditional_rule, contradiction]

# Enrichment: the 5 ORTHOGONAL catalog factors (vs Ch16's fused 3).
factors: [clarity, entity_aliasing, noise, reasoning_cue, instruction_conflict]
mode: embedded                                # base = balanced blocking factor

# Application level vocabulary. Each maps a domain-neutral catalog factor to
# this app's level labels. The materializer interprets these labels.
level_overrides:
  clarity:               [clear, ambiguous, misleading]
  entity_aliasing:       [canonical, alias, abbreviated]
  noise:                 [none, typo]
  reasoning_cue:         [direct, cot, none]
  instruction_conflict:  [none, misleading_cue]

# How each level maps back to a catalog level (provenance / documentation only).
level_aliases:
  entity_aliasing: {canonical: Exact, alias: Synonym, abbreviated: Abbreviated}
  noise:           {none: None, typo: Typos}
  reasoning_cue:   {direct: Direct, cot: Step_By_Step, none: No_Cue}
  instruction_conflict: {none: None, misleading_cue: Authority_Override}

# Per-component ground truth available on the seed cases (weak-link analysis).
components: [classification, product, issue, policy, escalation]

# The agent's fixed five-step workflow (trajectory scoring order).
workflow: [classify_complaint, extract_facts, search_policy, flag_regulatory, draft_response]

# --- Strict-parity option (reproduce Ch16's exact ad hoc design) -------------
# The original 3 fused factors, for byte-for-byte equivalence checks only.
parity_ch16:
  factors: [clarity, entity_aliasing, reasoning_cue]
  mode: embedded
  balance_base: false        # seed_case joins the design as a factor (as Ch16 does)
  design_method: sobol       # Ch16 uses plain sobol
  level_overrides:
    clarity:          [clear, ambiguous, misleading]
    entity_aliasing:  [canonical, alias, typo]            # fused: typo is really noise
    reasoning_cue:    [none, cot, misleading_cue]          # fused: cue is really instruction_conflict
